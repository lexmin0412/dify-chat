# Dify App Hub 独立部署配置
# 此文件可以独立使用，无需 clone 源码仓库
services:
  app:
    image: lexmin0412/dify-app-hub:latest
    container_name: dify-app-hub
    ports:
      - '5300:5300'
    # 自定义环境变量
    environment:
      - DATABASE_URL=mysql://username:password@host:port/database_name
      - NEXTAUTH_SECRET=your-secret-key-here
    restart: unless-stopped
    networks:
      - dify-app-hub-network

networks:
  dify-app-hub-network:
    driver: bridge
